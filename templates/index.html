<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hanger Monitor</title>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <header>
      <h1>Hanger Monitor</h1>
      <p>Real-time human detection with automatic recording</p>
    </header>

    <main>
      <section id="live-section" class="card">
        <div class="stream-container">
          <img id="live-stream" src="/stream.mjpg" alt="Live stream" />
          <div id="recording-overlay" class="overlay hidden">REC</div>
        </div>
        
        <div class="status-grid" id="status-panel">
          <div class="status-item">
            <span class="label">Detection</span>
            <span id="presence" class="badge-idle">CLEAR</span>
          </div>
          <div class="status-item">
            <span class="label">Status</span>
            <span id="recording-state" class="state-badge monitoring">MONITORING</span>
          </div>
          <div class="status-item">
            <span class="label">Confidence</span>
            <span id="confidence" class="value">0.00</span>
          </div>
          <div class="status-item">
            <span class="label">Performance</span>
            <span id="fps" class="value">0.0</span>
          </div>
        </div>
      </section>

      <section id="env-section" class="card grid-3">
        <div class="env-item">
          <span class="icon">🌡️</span>
          <div>
            <span class="label">Ambient</span>
            <div id="temperature" class="value">--</div>
          </div>
        </div>
        <div class="env-item">
          <span class="icon">🔥</span>
          <div>
            <span class="label">CPU Temp</span>
            <div id="cpu-temp" class="value">--</div>
          </div>
        </div>
        <div class="env-item">
          <span class="icon">💧</span>
          <div>
            <span class="label">Humidity</span>
            <div id="humidity" class="value">--%</div>
          </div>
        </div>
        
        <div class="control-item full-width">
          <div class="control-header">
            <span class="label">LED INTENSITY</span>
            <span id="led-value" class="value">0</span>
          </div>
          <input type="range" id="led-slider" min="0" max="255" value="0" />
        </div>
      </section>


      <section id="clips-section">
        <div class="section-header">
          <h2>Recorded Clips</h2>
        </div>
        <div id="clip-list" class="clip-grid">
          <!-- Clips will be injected here as cards -->
        </div>
      </section>
    </main>


    <script src="/static/js/app.js"></script>
  </body>
</html>
